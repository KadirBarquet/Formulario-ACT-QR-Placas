<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorización - Gusanitos de La Calle</title>
    <link href="style.css" rel="stylesheet"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="img/Logo_ACT.png" alt="ACT Logo" class="logo">
            <h1>AUTORIZACIÓN</h1>
        </div>

        <div id="input-section">
            <h3>Ingrese los Datos del Propietario</h3>
            <div class="form-group">
                <label for="placa-input">Placa</label>
                <input type="text" id="placa-input" placeholder="Ej: OBM0979, ABC1234">
            </div>
            <div class="form-group">
                <label for="nombre-input">Nombres</label>
                <input type="text" id="nombre-input" placeholder="Nombres">
            </div>
            <div>
                <label for="tipo-id">Tipo de identificación</label>
                <select id="tipo-id" onchange="mostrarInputID()">
                    <option value="">Seleccione...</option>
                    <option value="cedula">Cédula</option>
                    <option value="ruc">RUC</option>
                    <option value="ambos">Ambos</option>
                </select> 
            </div> 
            <div class="form-group" id="input-id-container"></div>
            <div class="form-group">
                <label for="autorizacion-input">Número de Autorización</label>
                <input type="text" id="autorizacion-input" placeholder="Ej: ACT-EP-DPOTTTM-016-2025-ACVIL" maxlength="30">
            </div>
            <div class="form-group">
                <label for="caducidad-input">Vigencia</label>
                <input type="date" id="caducidad-input" min="">
            </div>
            <button onclick="validateAndGenerate()">Validar y Generar QR</button>
            <div id="result-message" class="error"></div>
        </div>

        <div id="qr-container">
            <h3>Código QR Generado</h3>
            <div id="qrcode"></div>
            <button class="download-btn" onclick="downloadQR()">Descargar QR</button>
        </div>

        <div id="auth-details">
            <h3>Detalles de la Autorización</h3>
            <p><strong>Documento:</strong> <span id="auth-autorizacion"></span></p>
            <p><strong>Placa:</strong> <span id="auth-placa"></span></p>
            <p><strong>Nombres:</strong> <span id="auth-nombre"></span></p>
            <p><strong>Cédula:</strong> <span id="auth-cedula"></span></p>
            <p><strong>RUC:</strong> <span id="auth-ruc"></span></p>
            <p><strong>Vigencia:</strong> <span id="auth-caducidad"></span></p>
            
            <button class="download-btn" onclick="generatePDF()">Generar PDF de Autorización</button>
        </div>

        <div class="footer">
            <p>EMOVIM-EP | Av. Simón Bolívar y Juan Montalvo | Milagro, Ecuador | genercia@emovim-ep.gob.ec</p>
            <p id="current-date">Fecha: 24 de septiembre de 2025, 15:54</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
